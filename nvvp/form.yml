title: NVIDIA Visual Profiler
form:
  - cluster
  - queue
  - prepost1_num_hours
  - prepost2_num_hours
  - gpu1_num_cores
  - gpu2_num_cores
  - gpu1_required_memory
  - gpu2_required_memory
  - gpus_per_node
  - email
  - bc_vnc_resolution
  - desktop
attributes:
  cluster:
    widget: hidden_field
    value: prepost
  queue:
    label: Queue
    widget: select
    options:
      - [ "prepost-gpu1", "gpu1",
          data-hide-prepost2-num-hours: true,
          data-hide-gpu2-num-cores: true,
          data-hide-gpu2-required-memory: true ]
      - [ "prepost-gpu2", "gpu2",
          data-hide-prepost1-num-hours: true,
          data-hide-gpu1-num-cores: true,
          data-hide-gpu1-required-memory: true ]
  prepost1_num_hours:
    widget: number_field
    label: Elapsed Time (1 - 3 hours)
    value: 1
    min: 1
    max: 3
    step: 1
  prepost2_num_hours:
    widget: number_field
    label: Elapsed Time (1 - 24 hours)
    value: 1
    min: 1
    max: 24
    step: 1
  gpu1_num_cores:
    widget: number_field
    label: Number of CPU cores (1 - 72)
    value: 1
    min: 1
    max: 72
    step: 1
  gpu2_num_cores:
    widget: number_field
    label: Number of CPU cores (1 - 36)
    value: 1
    min: 1
    max: 36
    step: 1
  gpu1_required_memory:
    widget: number_field
    label: Required memory (10 - 186 GB)
    value: 10
    min: 10
    max: 186
    step: 1
  gpu2_required_memory:
    widget: number_field
    label: Required memory (10 - 93 GB)
    value: 10
    min: 10
    max: 93
    step: 1
  gpus_per_node:
    widget: number_field
    label: Number of GPUs (1 - 2)
    value: 1
    min: 1
    max: 2
    step: 1
    # The mouse cannot be seen unless the number of GPUs is 1 or more
  email:
    widget: email_field
    label: Email (You will receive an email when it starts)
  bc_vnc_resolution:
    required: true
  desktop:
    widget: hidden_field
    value: xfce
